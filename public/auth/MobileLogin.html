<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voltronite</title>
    <link rel="stylesheet" href="components/style.css" />
  </head>
  <body>

    <!-- 1:1 Chapter 1 Dual-Plane Kinetic Drift Animation Backgrounds -->
    <div class="fortnite-vignette-backdrop"></div>
    <div class="fortnite-kinetic-grid plane-one"></div>
    <div class="fortnite-kinetic-grid plane-two"></div>

    <!-- Game Logo Header Section -->
    <div class="logo-container">
      <h1>Voltronite</h1>
    </div>

    <!-- Main Content Container Box -->
    <div class="container">
      
      <!-- Top Title block -->
      <div class="card-header">
        <h2>Log In</h2>
      </div>

      <!-- Input Block -->
      <div class="card-body">
        <div class="instruction-area">
          <p class="instruction-text">Log in to your profile to continue!</p>
        </div>
        <div class="input-wrapper">
          <input type="text" id="username" placeholder="USERNAME" required />
        </div>
      </div>

      <!-- Action Button Block -->
      <div class="card-footer">
        <button onclick="redirect()">Log In</button>
      </div>

    </div>

    <!-- Operating custom redirect script -->
    <script>
      function redirect() {
        const username = document.getElementById("username").value.trim();
        if (!username) {
          alert("Please enter a username");
          return;
        }
        window.location.href = `com.epicgames.fortnite://authorize/?code=${encodeURIComponent(username)}`;
      }
    </script>
  </body>
</html>
